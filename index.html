<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports Marista — Mídia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAFBFC;
    --paper-dim: #F0F2F5;
    --ink: #1A1D29;
    --ink-soft: #545B6E;
    --ink-faint: #8B90A0;
    --brand: #2B4570;
    --brand-light: #4A6A9C;
    --line: #DDE1E8;
    --line-strong: #C5CAD4;
    --good: #1E7A4C;
    --good-bg: #E8F5EE;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
    --radius: 8px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* ---------- MASTHEAD ---------- */
  .masthead {
    border-bottom: 3px solid var(--ink);
    padding: 48px 0 24px;
    margin-bottom: 40px;
  }
  .eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--brand);
    margin: 0 0 10px;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 40px;
    line-height: 1.1;
    margin: 0 0 10px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .masthead p {
    margin: 0;
    font-size: 14.5px;
    color: var(--ink-soft);
    max-width: 560px;
  }

  /* ---------- SEARCH ---------- */
  .search-box {
    margin-bottom: 36px;
  }
  .search-box input {
    width: 100%;
    font-family: var(--sans);
    font-size: 14px;
    padding: 12px 16px;
    border: 1px solid var(--line-strong);
    border-radius: var(--radius);
    background: #fff;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }
  .search-box input:focus { border-color: var(--brand); }
  .search-box input::placeholder { color: var(--ink-faint); }

  /* ---------- SECTION ---------- */
  .section {
    margin-bottom: 40px;
  }
  .section-label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label .count {
    font-weight: 600;
    color: var(--ink-faint);
    background: var(--paper-dim);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 10.5px;
  }

  /* ---------- REPORT CARD ---------- */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    border-color: var(--brand-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(43, 69, 112, 0.08);
  }
  .card-icon {
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-weight: 700;
    font-size: 15px;
  }
  .card-icon.semanal { background: #E6F0FA; color: var(--brand); }
  .card-icon.mensal { background: #E2F5ED; color: var(--good); }
  .card-body { flex: 1 1 auto; min-width: 0; }
  .card-title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 16px;
    color: var(--ink);
    margin: 0 0 3px;
  }
  .card-period {
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  .card-latest {
    flex: 0 0 auto;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--good);
    background: var(--good-bg);
    border-radius: 3px;
    padding: 3px 8px;
  }
  .card-arrow {
    flex: 0 0 auto;
    color: var(--ink-faint);
    font-size: 18px;
    transition: transform 0.15s ease;
  }
  .card:hover .card-arrow { transform: translateX(3px); color: var(--brand); }

  .empty-state {
    font-size: 13px;
    color: var(--ink-faint);
    padding: 20px 0;
  }

  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 11.5px;
    color: var(--ink-faint);
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <p class="eyebrow">Marista · Mídia de Performance</p>
    <h1>Painel de Reports</h1>
    <p>Todos os relatórios semanais e mensais de investimento, leads e matrículas, organizados por período. Clique em qualquer item para abrir o report completo.</p>
  </div>

  <div class="search-box">
    <input type="text" id="search-input" placeholder="Buscar por período (ex: julho, semanal, mensal)...">
  </div>

  <div id="sections"></div>

  <footer>Arquivo mantido pela equipe de mídia · atualizado conforme novos relatórios são publicados.</footer>
</div>

<script>

const REPORTS = [
  {
    tipo: "semanal",
    titulo: "01 a 22 de julho de 2026",
    periodo: "" ,
    arquivo: "semanal_01_07_22_07.html",
    data: "2026-07-07",
    latest: true
  },
  {
    tipo: "mensal",
    titulo: "Junho 2026",
    periodo: "Consolidado do mês de junho",
    arquivo: "mensal_junho_26.html",
    data: "2026-06-30",
    latest: false
  }

  

];
/* ===================================================================== */

const TIPO_LABEL = { semanal: "Reports Semanais", mensal: "Reports Mensais" };
const TIPO_ICON  = { semanal: "S", mensal: "M" };

function renderSections(filterText = "") {
  const container = document.getElementById('sections');
  const term = filterText.trim().toLowerCase();

  const filtered = REPORTS.filter(r =>
    !term ||
    r.titulo.toLowerCase().includes(term) ||
    (r.periodo || "").toLowerCase().includes(term) ||
    r.tipo.toLowerCase().includes(term)
  );

  const order = ["semanal", "mensal"];
  const groups = order
    .map(tipo => ({ tipo, items: filtered.filter(r => r.tipo === tipo) }))
    .filter(g => g.items.length > 0);

  if (groups.length === 0) {
    container.innerHTML = `<div class="empty-state">Nenhum report encontrado.</div>`;
    return;
  }

  container.innerHTML = groups.map(g => {
    const sorted = [...g.items].sort((a, b) => new Date(b.data) - new Date(a.data));
    const cards = sorted.map(r => `
      <a class="card" href="${r.arquivo}">
        <div class="card-icon ${r.tipo}">${TIPO_ICON[r.tipo]}</div>
        <div class="card-body">
          <p class="card-title">${r.titulo}</p>
          <p class="card-period">${r.periodo || ''}</p>
        </div>
        ${r.latest ? '<span class="card-latest">Mais recente</span>' : ''}
        <span class="card-arrow">→</span>
      </a>
    `).join('');

    return `
      <div class="section">
        <p class="section-label">${TIPO_LABEL[g.tipo]} <span class="count">${g.items.length}</span></p>
        <div class="card-list">${cards}</div>
      </div>
    `;
  }).join('');
}

renderSections();

document.getElementById('search-input').addEventListener('input', (e) => {
  renderSections(e.target.value);
});
</script>
</body>
</html>
